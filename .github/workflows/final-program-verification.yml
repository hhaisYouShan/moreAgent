name: final-program-verification

on:
  push:
    branches: [main]
    paths:
      - docs/program-completion.json
      - docs/stage9-validation-report.json

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        run: npm install
      - name: Verify all OS regressions
        run: npm run verify
      - name: Verify nine-stage completion evidence
        run: node scripts/verify-program-completion.mjs
