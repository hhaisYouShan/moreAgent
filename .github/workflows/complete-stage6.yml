name: complete-stage6

on:
  workflow_run:
    workflows: [verify]
    types: [completed]

permissions:
  contents: write

jobs:
  advance:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'ci/verify-stage6-gate' &&
      github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    concurrency:
      group: complete-stage6
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Complete Stage 6 from verified evidence
        env:
          VALIDATION_WORKFLOW: verify
          VALIDATION_RUN_ID: ${{ github.event.workflow_run.id }}
          VALIDATION_RUN_URL: ${{ github.event.workflow_run.html_url }}
          VALIDATION_RESULT: ${{ github.event.workflow_run.conclusion }}
          VALIDATION_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          VALIDATION_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: node scripts/complete-stage6.mjs
      - name: Re-verify documentation state
        run: node scripts/verify-doc-fact-sources.mjs
      - name: Commit verified stage transition
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/program-status.json docs/roadmap.md docs/system-testing.md docs/stage6-validation-report.json validation/bossresume/stage7-entry-checklist.md
          git commit -m "docs: complete stage 6 system verification"
          git push origin HEAD:main
