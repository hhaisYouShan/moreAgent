name: stage8-correction

on:
  push:
    branches: [main]
    paths:
      - docs/stage7-validation-report.json
      - validation/bossresume/results/**

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    concurrency:
      group: stage8-correction
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Install dependencies
        run: npm install
      - name: Verify all regressions
        run: npm run verify
      - name: Apply Stage 8 evidence gate
        env:
          VALIDATION_WORKFLOW: stage8-correction
          VALIDATION_RUN_ID: ${{ github.run_id }}
          VALIDATION_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          VALIDATION_RESULT: SUCCESS
          VALIDATION_HEAD_SHA: ${{ github.sha }}
        run: node scripts/complete-stage8.mjs
      - name: Verify program state
        run: node scripts/verify-doc-fact-sources.mjs
      - name: Commit Stage 8 report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/program-status.json docs/roadmap.md docs/stage8-correction-report.json
          if git diff --cached --quiet; then
            echo "No Stage 8 transition to commit."
            exit 0
          fi
          git commit -m "docs: complete Stage 8 OS correction"
          git pull --rebase origin main
          git push origin HEAD:main
